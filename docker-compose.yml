services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-leitovivo}
      POSTGRES_USER: ${POSTGRES_USER:-leitovivo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-leitovivo}
      TZ: America/Sao_Paulo
      PGTZ: America/Sao_Paulo
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TZ: America/Sao_Paulo
      JAVA_TOOL_OPTIONS: -Duser.timezone=America/Sao_Paulo
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-leitovivo}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-leitovivo}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-leitovivo}
      SERVER_PORT: 8080
    ports:
      - "${APP_PORT:-8080}:8080"

volumes:
  postgres_data:
