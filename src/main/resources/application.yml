spring:
  application:
    name: leito-vivo
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/leitovivo}
    username: ${SPRING_DATASOURCE_USERNAME:leitovivo}
    password: ${SPRING_DATASOURCE_PASSWORD:leitovivo}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: America/Sao_Paulo
  flyway:
    enabled: true
    locations: classpath:db/migration

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

server:
  port: ${SERVER_PORT:8080}
